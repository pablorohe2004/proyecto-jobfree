# Nombre de la aplicacion
spring.application.name=jobfree-backend

# Puerto donde se ejecuta el servidor
server.port=8080

# Perfil activo (dev por defecto, sobreescribir en produccion con SPRING_PROFILES_ACTIVE=prod)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Conexion a la base de datos
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/jobfree?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# JWT — valor definido en cada perfil (dev/prod), no en el fichero base
jwt.secret=${JWT_SECRET}

# ── Google OAuth2 ──────────────────────────────────────────────────────────────
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.google.authorization-grant-type=authorization_code

# ── Microsoft (Azure) OAuth2 ───────────────────────────────────────────────────
spring.security.oauth2.client.registration.microsoft.client-id=${MICROSOFT_CLIENT_ID:disabled}
spring.security.oauth2.client.registration.microsoft.client-secret=${MICROSOFT_CLIENT_SECRET:disabled}
spring.security.oauth2.client.registration.microsoft.scope=User.Read
spring.security.oauth2.client.registration.microsoft.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.microsoft.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.microsoft.client-authentication-method=client_secret_post

spring.security.oauth2.client.provider.microsoft.authorization-uri=https://login.microsoftonline.com/common/oauth2/v2.0/authorize
spring.security.oauth2.client.provider.microsoft.token-uri=https://login.microsoftonline.com/common/oauth2/v2.0/token
spring.security.oauth2.client.provider.microsoft.user-info-uri=https://graph.microsoft.com/v1.0/me
spring.security.oauth2.client.provider.microsoft.user-name-attribute=id

# URL del frontend (usada en CORS y OAuth2SuccessHandler)
frontend.url=${FRONTEND_URL:http://localhost:3000}

# Cookie JWT — usar secure=true en produccion (requiere HTTPS)
cookie.secure=${COOKIE_SECURE:false}

# ── Email (SMTP Gmail) ─────────────────────────────────────────────────────────
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:tu-correo@gmail.com}
spring.mail.password=${MAIL_PASSWORD:tu-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Token de reset — expiración en minutos
reset.token.expiracion-minutos=${RESET_TOKEN_EXPIRACION:30}

# Directorio donde se guardan las imágenes subidas por usuarios
app.upload.dir=${UPLOAD_DIR:uploads}

# Límite de tamaño de archivo subido (5 MB por defecto)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ── Compresión HTTP ────────────────────────────────────────────────────────────
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain
server.compression.min-response-size=1024

# ── Caché de Spring ────────────────────────────────────────────────────────────
spring.cache.type=simple

# ── Swagger/OpenAPI ────────────────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha

# ── Stripe ─────────────────────────────────────────────────────────────────────
stripe.api.key=${STRIPE_SECRET_KEY:sk_test_placeholder}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:whsec_placeholder}

# ── Logging ────────────────────────────────────────────────────────────────────
logging.level.com.jobfree=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
